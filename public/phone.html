<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Photobooth — Caméra</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', sans-serif;
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
    }

    /* ── Vidéo ── */
    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── Flash ── */
    #flash {
      position: fixed;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 80;
      transition: opacity 0.08s;
    }
    #flash.on { opacity: 1; }

    /* ── Compte à rebours ── */
    #countdown {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 160px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 60px rgba(212,175,55,0.9), 0 0 120px rgba(212,175,55,0.4);
      z-index: 60;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.15s, transform 0.15s;
      pointer-events: none;
    }
    #countdown.show {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Indicateur de progression ── */
    #progress {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 70;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #progress.show { opacity: 1; }
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: 2px solid rgba(255,255,255,0.6);
      transition: background 0.3s;
    }
    .dot.done { background: #d4af37; border-color: #d4af37; }
    .dot.active { background: #fff; border-color: #fff; }

    /* ── Barre de statut ── */
    #status {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      padding: 12px 28px;
      border-radius: 99px;
      font-size: 16px;
      z-index: 70;
      text-align: center;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 90vw;
      white-space: normal;
    }

    /* ── Écran de fin ── */
    #done {
      position: fixed;
      inset: 0;
      background: #0a0a1a;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 100;
      text-align: center;
      padding: 40px;
    }
    #done.show { display: flex; }
    #done .emoji { font-size: 80px; }
    #done h1 { font-size: 36px; font-weight: 700; color: #d4af37; }
    #done p { color: #9090b0; font-size: 18px; line-height: 1.5; }

    /* ── Écran d'erreur ── */
    #error-screen {
      position: fixed;
      inset: 0;
      background: #0a0a1a;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 200;
      padding: 40px;
      text-align: center;
    }
    #error-screen.show { display: flex; }
    #error-screen h2 { color: #e05555; font-size: 24px; }
    #error-screen p { color: #9090b0; font-size: 16px; }

    canvas { display: none; }
  </style>
</head>
<body>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="flash"></div>

  <div id="countdown"></div>

  <div id="progress">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>

  <div id="status">📡 Initialisation...</div>

  <div id="done">
    <div class="emoji">🎉</div>
    <h1>C'est dans la boîte !</h1>
    <p>Retournez voir la tablette<br>pour finaliser votre strip.</p>
  </div>

  <div id="error-screen">
    <div style="font-size:48px">❌</div>
    <h2>Session invalide</h2>
    <p>Scannez le QR code affiché<br>sur la tablette du photobooth.</p>
  </div>

  <script>
    // ── Init ──────────────────────────────────────────────────────────────────

    const params    = new URLSearchParams(location.search);
    const sessionId = params.get('session');

    const video     = document.getElementById('video');
    const canvas    = document.getElementById('canvas');
    const ctx       = canvas.getContext('2d');
    const flash     = document.getElementById('flash');
    const cdEl      = document.getElementById('countdown');
    const statusEl  = document.getElementById('status');
    const progress  = document.getElementById('progress');
    const doneEl    = document.getElementById('done');
    const errEl     = document.getElementById('error-screen');

    if (!sessionId) {
      errEl.classList.add('show');
      throw new Error('No session');
    }

    let ws          = null;
    let streamLoop  = null;
    let capturing   = false;

    // ── Caméra ────────────────────────────────────────────────────────────────

    async function startCamera() {
      try {
        statusEl.textContent = '📷 Demande d\'accès à la caméra...';
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width:  { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });
        video.srcObject = stream;
        await video.play();
        statusEl.textContent = '📡 Connexion au serveur...';
        connectWS();
      } catch (err) {
        statusEl.textContent = `❌ Caméra inaccessible : ${err.message}`;
      }
    }

    // ── WebSocket ─────────────────────────────────────────────────────────────

    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'register', sessionId, role: 'phone' }));
        statusEl.textContent = '✅ Prêt — En attente du déclenchement sur la tablette...';
        startStream();
      };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'trigger' && !capturing) {
          capturing = true;
          startCapture(msg.count || 4);
        }
      };

      ws.onerror = () => {};
      ws.onclose = () => {
        stopStream();
        if (!capturing) {
          statusEl.textContent = '🔄 Reconnexion...';
          setTimeout(connectWS, 2500);
        }
      };
    }

    // ── Stream de preview (basse résolution) ──────────────────────────────────

    function startStream() {
      stopStream();
      streamLoop = setInterval(() => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;
        const W = video.videoWidth || 640;
        const H = video.videoHeight || 480;
        canvas.width  = Math.min(W, 640);
        canvas.height = Math.round((Math.min(W, 640) / W) * H);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const frame = canvas.toDataURL('image/jpeg', 0.35);
        ws.send(JSON.stringify({ type: 'frame', sessionId, data: frame }));
      }, 120);
    }

    function stopStream() {
      if (streamLoop) { clearInterval(streamLoop); streamLoop = null; }
    }

    // ── Séquence de capture ───────────────────────────────────────────────────

    async function startCapture(total) {
      stopStream();
      progress.classList.add('show');

      for (let i = 0; i < total; i++) {
        // Marquer la photo courante
        setDot(i, 'active');

        // Compte à rebours
        await countdown(3);

        // Flash + capture
        await doFlash();
        const url = await capturePhoto();

        // Marquer comme faite
        setDot(i, 'done');

        // Envoyer au serveur
        ws.send(JSON.stringify({
          type:  'photo-captured',
          sessionId,
          url,
          index: i,
          total
        }));

        // Pause entre les photos (sauf la dernière)
        if (i < total - 1) await sleep(2800);
      }

      // Fin
      progress.classList.remove('show');
      doneEl.classList.add('show');
    }

    // ── Compte à rebours ──────────────────────────────────────────────────────

    function countdown(from) {
      return new Promise(resolve => {
        let n = from;
        cdEl.textContent = n;
        cdEl.classList.add('show');

        const t = setInterval(() => {
          n--;
          if (n <= 0) {
            clearInterval(t);
            cdEl.classList.remove('show');
            resolve();
          } else {
            cdEl.textContent = n;
          }
        }, 1000);
      });
    }

    // ── Flash ─────────────────────────────────────────────────────────────────

    function doFlash() {
      return new Promise(resolve => {
        flash.classList.add('on');
        setTimeout(() => { flash.classList.remove('on'); resolve(); }, 120);
      });
    }

    // ── Capture haute résolution ──────────────────────────────────────────────

    function capturePhoto() {
      return new Promise(resolve => {
        canvas.width  = video.videoWidth  || 1280;
        canvas.height = video.videoHeight || 720;
        ctx.drawImage(video, 0, 0);

        canvas.toBlob(async (blob) => {
          const form = new FormData();
          form.append('photo', blob, 'photo.jpg');
          try {
            const res  = await fetch('/api/photo', { method: 'POST', body: form });
            const data = await res.json();
            resolve(data.url);
          } catch {
            resolve(null);
          }
        }, 'image/jpeg', 0.92);
      });
    }

    // ── Dots de progression ───────────────────────────────────────────────────

    function setDot(i, state) {
      const el = document.getElementById('d' + i);
      if (!el) return;
      el.className = 'dot ' + state;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ── Démarrage ─────────────────────────────────────────────────────────────

    startCamera();
  </script>
</body>
</html>
